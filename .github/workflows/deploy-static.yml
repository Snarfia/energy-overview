name: Deploy static site

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_run:
    workflows: ["Update overview.json"]
    types: [completed]
  push:
    branches: ["main"]
    paths:
      - "index.html"
      - "app.js"
      - "styles.css"
      - "static/**"
      - "overview.json"
      - "gas.html"
      - "elektriciteit.html"
      - ".github/workflows/deploy-static.yml"
  workflow_dispatch:

jobs:
  deploy:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: deploy-static-site
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate fresh overview.json
        env:
          ENTSOE_API_TOKEN: ${{ secrets.ENTSOE_API_TOKEN }}
          NED_API_TOKEN: ${{ secrets.NED_API_TOKEN }}
          TENNET_API_KEY: ${{ secrets.TENNET_API_KEY }}
        run: |
          npm install --no-audit --no-fund
          npm run update:overview
          cp -f static/overview.json overview.json

      - name: Prepare publish directory
        run: |
          rm -rf publish
          mkdir -p publish
          # Prefer static/ as source (current production structure); fallback to root files.
          SRC="."
          if [ -f "static/index.html" ] && [ -f "static/app.js" ] && [ -f "static/styles.css" ]; then
            SRC="static"
          fi
          echo "Using source directory: $SRC"
          cp -f "$SRC/index.html" publish/index.html
          cp -f "$SRC/app.js" publish/app.js
          cp -f "$SRC/styles.css" publish/styles.css
          cp -f "$SRC/overview.json" publish/overview.json
          cp -f "$SRC/gas.html" publish/gas.html
          cp -f "$SRC/elektriciteit.html" publish/elektriciteit.html
          ls -la publish

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          protocol: ftps
          local-dir: ./publish/
          server-dir: ${{ secrets.FTP_REMOTE_DIR }}
