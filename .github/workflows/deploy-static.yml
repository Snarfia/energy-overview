name: Deploy static site

on:
  workflow_run:
    workflows: ["Update overview.json"]
    types: [completed]
  push:
    branches: ["main"]
    paths:
      - "index.html"
      - "app.js"
      - "styles.css"
      - "overview.json"
      - "gas.html"
      - "elektriciteit.html"
      - "static/**"
      - ".github/workflows/deploy-static.yml"
  workflow_dispatch:

jobs:
  deploy:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: deploy-static-site
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare publish directory
        run: |
          rm -rf publish
          mkdir -p publish
          cp -f index.html publish/index.html
          cp -f app.js publish/app.js
          cp -f styles.css publish/styles.css
          cp -f overview.json publish/overview.json
          cp -f gas.html publish/gas.html
          cp -f elektriciteit.html publish/elektriciteit.html
          if [ -d static ]; then cp -R static publish/static; fi
          ls -la publish

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          protocol: ftps
          local-dir: ./publish/
          server-dir: ${{ secrets.FTP_REMOTE_DIR }}
