name: Deploy static site

on:
  workflow_run:
    workflows: ["Update overview.json"]
    types: [completed]
  push:
    branches: ["main"]
    paths:
      - "static/**"
      - ".github/workflows/deploy-static.yml"
  workflow_dispatch:

jobs:
  deploy:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: deploy-static-site
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build publish directory
        run: |
          rm -rf publish
          mkdir -p publish
          cp -f index.html publish/index.html || true
          cp -f app.js publish/app.js || true
          cp -f styles.css publish/styles.css || true
          cp -f overview.json publish/overview.json || true
          cp -f gas.html publish/gas.html || true
          cp -f elektriciteit.html publish/elektriciteit.html || true
          if [ -d static ]; then cp -R static publish/static; fi

      - name: Deploy via FTP (attempt 1)
        id: ftp_deploy_1
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          protocol: ftps
          local-dir: ./publish/
          server-dir: ${{ secrets.FTP_REMOTE_DIR }}

      - name: Deploy via FTP (attempt 2 retry same path)
        if: steps.ftp_deploy_1.outcome == 'failure'
        id: ftp_deploy_2
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          protocol: ftps
          local-dir: ./publish/
          server-dir: ${{ secrets.FTP_REMOTE_DIR }}

      - name: Deploy via FTP (attempt 3 fallback /httpdocs/)
        if: steps.ftp_deploy_1.outcome == 'failure' && steps.ftp_deploy_2.outcome == 'failure'
        id: ftp_deploy_3
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          protocol: ftps
          local-dir: ./publish/
          server-dir: /httpdocs/

      - name: Deploy via FTP (attempt 4 fallback /httpdocs/static/)
        if: steps.ftp_deploy_1.outcome == 'failure' && steps.ftp_deploy_2.outcome == 'failure' && steps.ftp_deploy_3.outcome == 'failure'
        id: ftp_deploy_4
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          protocol: ftps
          local-dir: ./publish/
          server-dir: /httpdocs/static/

      - name: Deploy via FTP (attempt 5 fallback protocol ftp)
        if: steps.ftp_deploy_1.outcome == 'failure' && steps.ftp_deploy_2.outcome == 'failure' && steps.ftp_deploy_3.outcome == 'failure' && steps.ftp_deploy_4.outcome == 'failure'
        id: ftp_deploy_5
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftp
          local-dir: ./publish/
          server-dir: /httpdocs/

      - name: Fail if all deploy attempts failed
        if: steps.ftp_deploy_1.outcome == 'failure' && steps.ftp_deploy_2.outcome == 'failure' && steps.ftp_deploy_3.outcome == 'failure' && steps.ftp_deploy_4.outcome == 'failure' && steps.ftp_deploy_5.outcome == 'failure'
        run: |
          echo "All FTP deploy attempts failed."
          exit 1
