<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Energy Dashboard 2026-02-19-new</title>
    <style>
      :root {
        --bg: #eef3ef;
        --card: #ffffff;
        --line: #d6dfda;
        --text: #1e2723;
        --muted: #52615b;
        --accent: #1d5f8c;
      }
      * { box-sizing: border-box; }
      html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; font-family: "Avenir Next", "Segoe UI", sans-serif; color: var(--text); background: linear-gradient(160deg, #f7f4ec, var(--bg)); }
      body { display: grid; place-items: center; }
      .frame {
        width: min(100vw, calc(100vh * 16 / 9));
        height: min(100vh, calc(100vw * 9 / 16));
        background: rgba(255,255,255,.65);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: .55rem;
        display: grid;
        grid-template-rows: auto 1fr;
        gap: .45rem;
      }
      .top { display: flex; align-items: center; justify-content: space-between; gap: .5rem; }
      .tabs { display: flex; gap: .4rem; }
      .tab { border: 1px solid var(--line); background: #fff; color: var(--accent); text-decoration: none; padding: .35rem .7rem; border-radius: 999px; font-size: .82rem; font-weight: 700; }
      .tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
      .stamp { font-size: .72rem; color: var(--muted); white-space: nowrap; }
      .grid {
        display: grid;
        grid-template-columns: minmax(0, 2.2fr) minmax(260px, 1fr);
        grid-template-rows: minmax(0, 1fr) minmax(0, 1fr);
        gap: .45rem;
        min-height: 0;
      }
      .panel {
        border: 1px solid var(--line);
        border-radius: 10px;
        background: var(--card);
        padding: .45rem;
        min-height: 0;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }
      .main { grid-column: 1; grid-row: 1 / span 2; }
      .wholesale { grid-column: 2; grid-row: 1; }
      .retail { grid-column: 2; grid-row: 2; }
      .title { font-size: .82rem; color: #2d3935; margin: 0 0 .3rem; font-weight: 700; }
      .cards {
        display: grid;
        grid-template-columns: repeat(2, minmax(0,1fr));
        gap: .35rem;
        min-height: 0;
      }
      .stack { display: grid; grid-template-columns: 1fr; gap: .35rem; min-height: 0; }
      .card { border: 1px solid var(--line); border-radius: 8px; padding: .4rem; overflow: hidden; }
      .card h3 { margin: 0; font-size: .78rem; color: #33413d; }
      .v { margin: .25rem 0 .15rem; font-size: 1rem; font-weight: 700; }
      .m { margin: 0; font-size: .68rem; color: var(--muted); line-height: 1.2; }
      .src { display: inline-block; margin-top: .2rem; font-size: .66rem; color: var(--accent); text-decoration: none; }
      .wide { grid-column: 1 / -1; }
      @media (max-width: 900px) {
        html, body { overflow: auto; }
        .frame { width: 100%; height: auto; min-height: 100vh; border-radius: 0; border: 0; }
        .grid { grid-template-columns: 1fr; grid-template-rows: auto; }
        .main,.wholesale,.retail { grid-column: auto; grid-row: auto; }
        .cards { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main class="frame">
      <div class="top">
        <div class="tabs">
          <a id="tab-electricity" class="tab" href="/?page=electricity">Elektriciteit</a>
          <a id="tab-gas" class="tab" href="/?page=gas">Aardgas</a>
        </div>
        <div id="stamp" class="stamp">Build 2026-02-19-new</div>
      </div>

      <section class="grid">
        <section class="panel main">
          <h2 id="mainTitle" class="title">Hoofd</h2>
          <div id="mainCards" class="cards"></div>
        </section>
        <section class="panel wholesale">
          <h2 id="whTitle" class="title">Groothandel</h2>
          <div id="whCards" class="stack"></div>
        </section>
        <section class="panel retail">
          <h2 id="rtTitle" class="title">Retail</h2>
          <div id="rtCards" class="stack"></div>
        </section>
      </section>
    </main>

    <script>
      const DEMAND = {
        electricity: ["nlElectricityOverview", "tennetRegulation", "nlGridFrequency", "nlCrossBorderFlows"],
        gas: ["nlGasConsumptionBreakdown", "nlGasImport", "nlGasProduction", "nlGasStorage"]
      };
      const WHOLESALE = { electricity: ["dayAheadPower24h", "ets", "tennetSettlement"], gas: ["ttfGas", "ets"] };
      const RETAIL = { electricity: ["gaslichtElectricity"], gas: ["gaslichtGas"] };

      const qp = new URLSearchParams(location.search);
      const rawPage = String(qp.get("page") || "").toLowerCase().trim();
      const page = (rawPage === "gas" || rawPage === "aardgas") ? "gas" : "electricity";

      document.getElementById("tab-electricity").classList.toggle("active", page === "electricity");
      document.getElementById("tab-gas").classList.toggle("active", page === "gas");
      document.getElementById("mainTitle").textContent = page === "gas" ? "Aardgas NL" : "Elektriciteit NL";
      document.getElementById("whTitle").textContent = page === "gas" ? "Aardgas - Groothandelsmarkten" : "Elektriciteit - Groothandelsmarkten";
      document.getElementById("rtTitle").textContent = page === "gas" ? "Aardgas - Retail" : "Elektriciteit - Retail";

      function fmt(v) {
        const n = Number(v);
        if (!Number.isFinite(n)) return "n/a";
        return n.toLocaleString(undefined, { maximumFractionDigits: 2 });
      }

      function card(item, wide = false) {
        const el = document.createElement("article");
        el.className = `card${wide ? " wide" : ""}`;
        const val = item.valueText || `${fmt(item.value)} ${item.unit || ""}`.trim();
        el.innerHTML = `
          <h3>${item.label || item.id}</h3>
          <div class="v">${val}</div>
          <p class="m">${item.source || "bron"} | ${item.updatedAt || ""}${item.detail ? ` | ${item.detail}` : ""}</p>
          ${item.sourceUrl ? `<a class="src" href="${item.sourceUrl}" target="_blank" rel="noreferrer">Open source</a>` : ""}
        `;
        return el;
      }

      async function load() {
        const r = await fetch(`./overview.json?t=${Date.now()}`, { cache: "no-store" });
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        const data = await r.json();
        const byId = new Map((data.items || []).map((x) => [x.id, x]));

        const main = document.getElementById("mainCards");
        const wh = document.getElementById("whCards");
        const rt = document.getElementById("rtCards");
        main.innerHTML = ""; wh.innerHTML = ""; rt.innerHTML = "";

        for (const id of DEMAND[page]) {
          const it = byId.get(id); if (!it) continue;
          main.appendChild(card(it, id === "nlCrossBorderFlows" || id === "nlGasImport" || id === "dayAheadPower24h"));
        }
        for (const id of WHOLESALE[page]) {
          const it = byId.get(id); if (!it) continue;
          wh.appendChild(card(it));
        }
        for (const id of RETAIL[page]) {
          const it = byId.get(id); if (!it) continue;
          rt.appendChild(card(it));
        }

        document.getElementById("stamp").textContent = `Build 2026-02-19-new | ${new Date().toLocaleTimeString()}`;
      }

      load().catch((e) => {
        document.getElementById("stamp").textContent = `Build 2026-02-19-new | fout: ${e.message}`;
      });
      setInterval(load, 120000);
    </script>
  </body>
</html>
